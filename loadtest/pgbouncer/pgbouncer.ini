; pgbouncer config for the GymHub load-test stack.
; Started/stopped by loadtest/run_loadtest.sh — paths are relative to GymHubBackend/.
; userlist.txt is generated at runtime from .env's DB_PASSWORD; do not commit.

[databases]
gym_hub = host=127.0.0.1 port=5432 dbname=gym_hub
gymhub_loadtest = host=127.0.0.1 port=5432 dbname=gymhub_loadtest

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432

auth_type = md5
auth_file = ./loadtest/pgbouncer/userlist.txt

; Transaction pooling: many client conns share a small server pool. Required
; with gevent — keeps Postgres max_connections (100) from being the ceiling.
; Caveat handled in core/settings.py via DISABLE_SERVER_SIDE_CURSORS=USE_PGBOUNCER.
pool_mode = transaction

default_pool_size = 25
min_pool_size = 10
reserve_pool_size = 5
reserve_pool_timeout = 3
max_client_conn = 2000

server_reset_query = DISCARD ALL

; Django/libpq sends these on connect; pgbouncer rejects unknown params in
; transaction mode unless we whitelist them.
ignore_startup_parameters = extra_float_digits,application_name

logfile = ./loadtest/logs/pgbouncer.log
pidfile = ./loadtest/logs/pgbouncer.pid

admin_users = postgres
stats_users = postgres
